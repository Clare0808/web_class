<!DOCTYPE html>
<html>
    <head>
        <title>Hsin-Yu YANG</title>

        <style>
            .ele1,
            .ele2,
            .ele3 {
                width: 350px;
                height: 30px;
                font-size: 30px;
                line-height: 30px;
                margin: 20px 0;
            }
            .ele1 {
                background-color: lightblue;
                border: 3px double red;
            }
            .ele2 {
                background-color: yellow;
                border: 3px solid lightblue;
                border-radius: 4px;
            }
            .ele3 {
                background-color: lightgreen;
                border: 3px dotted gray;
            }
        </style>
    </head>
    
    <body>
        <div class="ele1">Hello World</div>
        <div class="ele2">Hello World</div>
        <div class="ele3">Hello World</div>
    </body>
</html>
