<!DOCTYPE html>
<html>
    <head>
        <title>button</title>

        <style>
            .btn {
                height: 22px;
                color: #2f2f2f;
                background-color: #ffffff;
                font-size: 13px;
                border-radius: 8px;
                outline: 1px #2f2f2f;
                line-height: 18px;
            }
            .btn:hover {
                background-color: #d0d0d0;
                cursor: pointer;
            }
        </style>
    </head>
    
    <body>
        <button class="btn">查看資訊</button>
    </body>
</html>
