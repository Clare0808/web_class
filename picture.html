<!DOCTYPE html>
<html>
    <head>
        <title>Picture</title>

        <style>
            body {
                width: 100%;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .img1 {
                width: 33%;
                height: 300px;
                border-radius: 18px;
            }
            .img2 {
                width: 150px;
                height: 150px;
                border: 1px solid #000000;
                border-radius: 50%;
            }
            .img3 {
                width: 33%;
                height: 300px;
            }
        </style>
    </head>

    <body>
        <div class="frame">
            <img class="img1" src="./images.jpg" />
            <img class="img2" src="./img.jpg" />
            <img class="img3" src="./images.jpg" />
        </div>
    </body>
</html>
