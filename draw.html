<!DOCTYPE html>
<html>
    <head>
        <title>Hsin-Yu YANG</title>

        <style>
            .container {
                position: relative;
                width: 400px;
                height: 250px;
            }
            .rectangle {
                width: 200px;
                height: 200px;
                background-color: blue;
                border: 3px solid black;
                position: absolute;
                left: 50px;
                top: 30px;
            }
            .circle {
                width: 200px;
                height: 200px;
                background-color: red;
                border: 3px solid yellow;
                border-radius: 50%;
                position: absolute;
                left: 150px;
                top: 30px;
            }
        </style>
    </head>
    
    <body>
        <div class="container">
            <div class="rectangle"></div>
            <div class="circle"></div>
        </div>  
    </body>
</html>
