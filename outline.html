<!DOCTYPE html>
<html>
    <head>
        <title>Hsin-Yu YANG</title>

        <style>
            .ele1 {
                font-size: 40px;
                font-weight: bold;
                text-shadow: 2px 2px lightpink;
                text-decoration: overline;
                margin: 20px 0;
            }
            .ele2 {
                font-size: 25px;
                font-weight: bold;
                font-style: italic;
                text-decoration: line-through;
                border: 1px solid black;
                outline: 2px solid yellow;
                margin: 20px 0;
            }
            .ele3 {
                font-size: 18px;
                font-weight: bold;
                text-decoration: underline;
                text-align: right;
                margin: 20px 0;
            }
        </style>
    </head>
    
    <body>
        <div class="ele1">This is heading 1</div>
        <div class="ele2">This is heading 2</div>
        <div class="ele3">This is heading 3</div>
    </body>
</html>
